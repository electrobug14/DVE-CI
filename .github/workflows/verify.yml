name: HDL Ecosystem — Full EDA Pipeline

on:
  push:
    paths:
      - '**/design.v'

jobs:
  eda-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ─────────────────────────────────────────
      # 1. CHECKOUT
      # ─────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ─────────────────────────────────────────
      # 2. TOOL INSTALLATION
      # ─────────────────────────────────────────
      - name: Install EDA Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            iverilog \
            gtkwave xvfb xauth \
            yosys \
            graphviz \
            jq bc python3-pip
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g netlistsvg

      # ─────────────────────────────────────────
      # 3. IDENTIFY WHICH FOLDER CHANGED
      # ─────────────────────────────────────────
      - name: Identify Changed Design Folder
        id: get_dir
        run: |
          EMPTY_TREE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            BASE="HEAD^"
          else
            BASE="$EMPTY_TREE"
          fi

          DIR=$(git diff --name-only "$BASE" HEAD \
            | grep 'design\.v$' \
            | head -n 1 \
            | xargs dirname 2>/dev/null)

          if [ -z "$DIR" ]; then
            echo "❌ No design.v found in this push."
            exit 1
          fi

          echo "workdir=$DIR" >> $GITHUB_OUTPUT
          echo "📁 Working directory: $DIR"

      # ─────────────────────────────────────────
      # 4. SIMULATION
      # ─────────────────────────────────────────
      - name: Run Simulation
        id: simulation
        run: |
          cd ${{ steps.get_dir.outputs.workdir }}

          iverilog -g2012 \
            -o sim.vvp \
            design.v \
            ../scripts/universal_tb.v \
            2>&1 | tee compile_log.txt
          COMPILE_STATUS=${PIPESTATUS[0]}

          if [ $COMPILE_STATUS -eq 0 ]; then
            vvp sim.vvp 2>&1 | tee sim_output.txt
            SIM_STATUS=${PIPESTATUS[0]}
          else
            echo "Compilation failed." > sim_output.txt
            SIM_STATUS=1
          fi

          echo "compile_ok=$([ $COMPILE_STATUS -eq 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "sim_ok=$([ $SIM_STATUS -eq 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────
      # 5. WAVEFORM EXPORT (GTKWave → PNG)
      # ─────────────────────────────────────────
      - name: Export Waveform PNG
        id: waveform
        run: |
          cd ${{ steps.get_dir.outputs.workdir }}

          if [ ! -f dump.vcd ]; then
            echo "⚠️  dump.vcd not found — skipping waveform export"
            echo "ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Explicit screen size helps GTKWave render properly headless
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            gtkwave dump.vcd --script ../scripts/wave_export.tcl \
            2>&1 | tee waveform_log.txt

          if [ -f waveform.png ]; then
            echo "✅ waveform.png generated ($(du -h waveform.png | cut -f1))"
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  GTKWave ran but waveform.png was not produced"
            cat waveform_log.txt
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────
      # 6. SYNTHESIS (Yosys)
      # ─────────────────────────────────────────
      - name: Run Synthesis
        id: synthesis
        run: |
          cd ${{ steps.get_dir.outputs.workdir }}

          yosys -p "
            read_verilog -sv design.v;
            synth -top dut -flatten;
            opt;
            write_json netlist.json;
            write_verilog synth_netlist.v;
            stat;
          " 2>&1 | tee yosys_log.txt

          # Extract stat block for metrics parser
          awk '/=== design hierarchy ===/,0' yosys_log.txt > synth_stats.txt

          # Gate diagram (separate call to avoid stat conflict)
          yosys -p "
            read_verilog -sv design.v;
            synth -top dut -flatten;
            show -format dot -prefix schematic_raw;
          " 2>/dev/null || true

          echo "ok=$([ -f netlist.json ] && echo true || echo false)" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────
      # 7. SCHEMATIC (netlistsvg → SVG)
      # ─────────────────────────────────────────
      - name: Generate Schematic SVG
        id: schematic
        run: |
          cd ${{ steps.get_dir.outputs.workdir }}

          if [ -f netlist.json ]; then
            netlistsvg netlist.json -o schematic.svg 2>&1
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

          if [ -f schematic_raw.dot ]; then
            dot -Tsvg schematic_raw.dot -o schematic_gates.svg
          fi

      # ─────────────────────────────────────────
      # 8. HARDWARE METRICS
      # ─────────────────────────────────────────
      - name: Extract Hardware Metrics
        id: metrics
        run: |
          cd ${{ steps.get_dir.outputs.workdir }}
          python3 ../scripts/parse_metrics.py \
            --yosys-log yosys_log.txt \
            --stat-json synth_stats.txt \
            --output hardware_metrics.json \
            2>&1
          echo "ok=$([ -f hardware_metrics.json ] && echo true || echo false)" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────
      # 9. TIMING ANALYSIS
      # ─────────────────────────────────────────
      - name: Run Timing Analysis
        run: |
          cd ${{ steps.get_dir.outputs.workdir }}
          python3 ../scripts/estimate_timing.py \
            --yosys-log yosys_log.txt \
            --netlist synth_netlist.v \
            --output timing_report.txt \
            2>&1

      # ─────────────────────────────────────────
      # 10. BUILD MARKDOWN REPORT
      # ─────────────────────────────────────────
      - name: Build Simulation Report
        run: |
          cd ${{ steps.get_dir.outputs.workdir }}
          python3 ../scripts/build_report.py \
            --project "${{ steps.get_dir.outputs.workdir }}" \
            --sim-output sim_output.txt \
            --compile-log compile_log.txt \
            --metrics hardware_metrics.json \
            --timing timing_report.txt \
            --has-waveform "${{ steps.waveform.outputs.ok }}" \
            --has-schematic "${{ steps.schematic.outputs.ok }}" \
            --output simulation_log.md

      # ─────────────────────────────────────────
      # 11. COMMIT ALL RESULTS INTO REPO
      #     Explicit paths (not **) so auto-commit
      #     finds the actual generated files
      # ─────────────────────────────────────────
      - name: Commit Results to Repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 auto: EDA results for ${{ steps.get_dir.outputs.workdir }}"
          file_pattern: >-
            ${{ steps.get_dir.outputs.workdir }}/simulation_log.md
            ${{ steps.get_dir.outputs.workdir }}/waveform.png
            ${{ steps.get_dir.outputs.workdir }}/schematic.svg
            ${{ steps.get_dir.outputs.workdir }}/schematic_gates.svg
            ${{ steps.get_dir.outputs.workdir }}/timing_report.txt
            ${{ steps.get_dir.outputs.workdir }}/hardware_metrics.json
            ${{ steps.get_dir.outputs.workdir }}/synth_netlist.v

      # ─────────────────────────────────────────
      # 12. UPLOAD AS ACTIONS ARTIFACTS (backup)
      # ─────────────────────────────────────────
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hdl-results-${{ steps.get_dir.outputs.workdir }}
          path: |
            ${{ steps.get_dir.outputs.workdir }}/simulation_log.md
            ${{ steps.get_dir.outputs.workdir }}/waveform.png
            ${{ steps.get_dir.outputs.workdir }}/schematic.svg
            ${{ steps.get_dir.outputs.workdir }}/schematic_gates.svg
            ${{ steps.get_dir.outputs.workdir }}/timing_report.txt
            ${{ steps.get_dir.outputs.workdir }}/hardware_metrics.json
            ${{ steps.get_dir.outputs.workdir }}/synth_netlist.v
          retention-days: 30
          if-no-files-found: warn
